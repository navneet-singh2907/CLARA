services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      APP_ENV: docker
      USE_LLM_AGENTS: ${USE_LLM_AGENTS:-false}
      LLM_PROVIDER: ${LLM_PROVIDER:-nebius}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      NEBIUS_API_KEY: ${NEBIUS_API_KEY:-}
      NEBIUS_BASE_URL: ${NEBIUS_BASE_URL:-https://api.tokenfactory.nebius.com/v1/}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-Qwen/Qwen3-235B-A22B-Instruct-2507}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.2}
      PRIMARY_JUDGE_MODEL: ${PRIMARY_JUDGE_MODEL:-}
      SECONDARY_JUDGE_MODEL: ${SECONDARY_JUDGE_MODEL:-}
      JUDGE_TEMPERATURE: ${JUDGE_TEMPERATURE:-0.2}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-loan-review-pipeline}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
